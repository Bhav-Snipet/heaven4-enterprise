version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: heaven4-postgres
    environment:
      POSTGRES_DB: heaven4
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - heaven4_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d heaven4"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  heaven4_pgdata:
