spring:
  datasource:
    url: jdbc:h2:mem:heaven4test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

heaven4:
  security:
    jwt:
      secret: heaven4-test-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-alg
      access-token-expiry-ms: 3600000
      refresh-token-expiry-ms: 604800000
    cors:
      allowed-origins:
        - http://localhost:5173

logging:
  level:
    com.heaven4: DEBUG
